<section class="exercises-section" id="exercises" data-section="catalog">
  <div class="container">

    <div class="exercises-header-wrapper">

      <h2 class="exercises-main-title">
        Exercises
        <span id="category-slash" class="visually-hidden"> /</span>
        <span id="selected-category-name" class="exercises-category-subtitle"></span>
      </h2>

      <div class="exercises-controls">

        <nav class="exercises-filters" aria-label="Exercise filters">
          <ul class="filter-list" id="filter-list" role="list">
            <li class="filter-item">
              <button class="filter-btn active" type="button" data-filter="Muscles" aria-pressed="true">
                Muscles
              </button>
            </li>
            <li class="filter-item">
              <button class="filter-btn" type="button" data-filter="Body parts" aria-pressed="false">
                Body parts
              </button>
            </li>
            <li class="filter-item">
              <button class="filter-btn" type="button" data-filter="Equipment" aria-pressed="false">
                Equipment
              </button>
            </li>
          </ul>
        </nav>

        <form class="search-form visually-hidden" id="search-form" role="search" aria-label="Search exercises">
          <div class="search-input-wrapper">
            <input
              type="text"
              name="query"
              id="search-input"
              placeholder="Search"
              class="search-input"
              autocomplete="off"
            />
            <button type="submit" class="search-submit-btn" aria-label="Search">
              <svg width="18" height="18" viewBox="0 0 32 32" fill="none" aria-hidden="true">
                <path stroke="currentColor" stroke-linejoin="round" stroke-linecap="round" stroke-miterlimit="4" stroke-width="2.6667" d="M14.667 25.333c5.891 0 10.667-4.776 10.667-10.667s-4.776-10.667-10.667-10.667c-5.891 0-10.667 4.776-10.667 10.667s4.776 10.667 10.667 10.667z"></path>
                <path stroke="currentColor" stroke-linejoin="round" stroke-linecap="round" stroke-miterlimit="4" stroke-width="2.6667" d="M28 28l-5.8-5.8"></path>
              </svg>
            </button>
          </div>
        </form>

      </div>
    </div>

    <div class="categories-wrapper" data-section="categories">
      <ul class="categories-list" id="categories-container" role="list">
      </ul>
    </div>

    <div class="exercises-wrapper visually-hidden" data-section="exercises-list">
      <ul class="exercises-list" id="exercises-container" role="list">
      </ul>
    </div>

    <div class="pagination" id="pagination-container">
    </div>

  </div>
</section>
